  #       with:
  #         fetch-depth: 0
  #
  #     - name: Set up Java 17
  #       uses: actions/setup-java@v4
  #       with:
  #         java-version: '17'
  #         distribution: 'temurin'
  #         cache: maven
  #
  #     - name: Cache SonarCloud Packages
  #       uses: actions/cache@v4
  #       with:
  #         path: ~/.sonar/cache
