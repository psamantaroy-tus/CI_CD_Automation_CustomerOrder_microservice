  # ============================================================
  # 8. DEPLOY TO LOCAL DOCKER DESKTOP
  # ============================================================
  deploy-local:
    name: Deploy to Local Docker Desktop
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    needs: docker

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull latest Docker image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/customer-order-api:latest

      - name: Stop and remove old container (if exists)
        run: |
          $exists = docker ps -a --filter "name=customer-order-api" --format "{{.Names}}"
          if ($exists -match "customer-order-api") {
            docker stop customer-order-api
            docker rm customer-order-api
          } else {
            Write-Host "Container customer-order-api does not exist; skipping stop/remove."
          }
        shell: powershell

      - name: Run new container
        run: |
          docker run -d `
            --name customer-order-api `
            -p 9090:9090 `
            ${{ secrets.DOCKER_USERNAME }}/customer-order-api:latest
        shell: powershell

      - name: Verify container is running
        run: docker ps --filter "name=customer-order-api"

      - name: Local deployment complete
        run: echo "Local Docker Desktop deployment complete Priyanka!"