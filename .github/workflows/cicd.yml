  #         -Dsonar.qualitygate.wait=true

  # ============================================================
  # 6. DOCKER BUILD & PUSH
  # ============================================================
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: integration-test

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/customer-order-api:latest .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/customer-order-api:latest

  # ============================================================
  # 7. DEPLOY TO REMOTE SERVER
  # ============================================================
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "Pulling latest Docker image..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/customer-order-api:latest

            echo "Stopping existing container..."
            docker stop customer-order-api || true

            echo "Removing existing container..."
            docker rm customer-order-api || true

            echo "Starting new container on port 9090..."
            docker run -d \
              --name customer-order-api \
              -p 9090:9090 \
              ${{ secrets.DOCKER_USERNAME }}/customer-order-api:latest

            echo "Deployment complete, great Job PRIYANKA!"
