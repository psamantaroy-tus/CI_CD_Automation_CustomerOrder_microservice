name: CI/CD Pipeline Testing after added username and password

# ----------------------------
# 1. TRIGGER
# ----------------------------
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  # ============================================================
  # 2. BUILD
  # ============================================================
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven (skip tests)
        run: mvn clean package -DskipTests

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1

  # ============================================================
  # 3. UNIT TESTS
  # ============================================================
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Runs CustomerService_UnitTest — pure Mockito, no Spring context required
      - name: Run Unit Tests
        run: mvn test -Dtest=CustomerService_UnitTest

      - name: Upload Unit Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: target/surefire-reports/

  # ============================================================
  # 4. INTEGRATION TESTS
  # ============================================================
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-test

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Runs CustomerControllerIntegrationTest — @SpringBootTest with H2 in-memory DB
      - name: Run Integration Tests
        run: mvn test -Dtest=CustomerControllerIntegrationTest

      - name: Upload Integration Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-report
          path: target/surefire-reports/

